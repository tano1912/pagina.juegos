<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Station | Premium Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <h1 class="logo">GAME <span>STATION</span></h1>
            <div class="status-bar">
                <span id="clock">00:00</span>
                <span class="online-dot"></span> Online
            </div>
        </div>
    </header>

    <div class="hero-banner">
        <p>Catálogo Digital de Juegos Seleccionados</p>
    </div>

    <main class="container">
        <section class="list-section">
            <h2 class="category-title border-3ds">
                <span class="icon">🎮</span> Nintendo 3DS
            </h2>
            <ul id="lista3DS" class="text-list"></ul>
        </section>

        <section class="list-section">
            <h2 class="category-title border-wii">
                <span class="icon">💿</span> Nintendo Wii
            </h2>
            <ul id="listaWii" class="text-list"></ul>
        </section>

        <section class="wa-section">
            <div class="wa-header">
                <h2>SOLICITUD DE DESCARGA</h2>
                <p>Completa los datos para procesar tu pedido vía WhatsApp</p>
            </div>
            <div class="wa-grid">
                <div class="input-group">
                    <label>Nombre del Cliente</label>
                    <input type="text" id="waNombre" placeholder="Ej: Juan Pérez">
                </div>
                <div class="input-group">
                    <label>Título del Juego</label>
                    <input type="text" id="waJuego" placeholder="Ej: Mario Kart 7">
                </div>
                <div class="input-group">
                    <label>Tu Teléfono</label>
                    <input type="tel" id="waTel" placeholder="+58 412...">
                </div>
                <button onclick="enviarPedido()" class="btn-wa">
                    GENERAR PEDIDO ⚡
                </button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Game Station - Calidad Premium</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
